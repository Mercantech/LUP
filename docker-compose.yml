services:
  lup:
    build: .
    container_name: lup
    restart: unless-stopped
    networks:
      - traefik
    labels:
      - traefik.enable=true

      - traefik.http.routers.lup.rule=Host(`lup.mercantec.tech`)
      - traefik.http.routers.lup.entrypoints=websecure
      - traefik.http.routers.lup.tls=true
      - traefik.http.routers.lup.tls.certresolver=letsencrypt

      - traefik.http.services.lup.loadbalancer.server.port=80

networks:
  traefik:
    external: true

